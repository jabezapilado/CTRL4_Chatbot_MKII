<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC Guidance Office — Admin Chat Takeover</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/chatbot.css" />
</head>
<body>
  <div class="page admin-chat-page">
    <header class="header">
      <div class="header-inner">
        <img src="/static/img/soc-logo.png" alt="SOC logo" class="logo-img" />
        <div class="header-text">
          <div class="header-title">SOC Guidance Office — Staff Takeover</div>
          <div class="header-sub">Answer student concerns directly in takeover mode</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="status-dot" title="Online"></div>
          <button class="btn btn-outline" type="button" onclick="returnToDashboard()">Dashboard</button>
        </div>
      </div>
      <div class="gold-bar"></div>
    </header>

    <div class="takeover-summary">
      <div class="takeover-labels">
        <div>
          <span class="summary-label">Student</span>
          <strong id="admin-student-name">—</strong>
        </div>
        <div>
          <span class="summary-label">Student ID</span>
          <strong id="admin-student-id">—</strong>
        </div>
      </div>
      <div class="takeover-labels">
        <div>
          <span class="summary-label">Category</span>
          <strong id="admin-category">—</strong>
        </div>
        <div>
          <span class="summary-label">Received</span>
          <strong id="admin-time">—</strong>
        </div>
      </div>
    </div>

    <div class="chat-area scrollable" id="admin-chat-area">
      <div class="date-divider"><span>Takeover Session</span></div>
    </div>

    <div class="quick-replies" id="admin-quick-replies" style="padding:0 16px 10px; gap:8px;">
      <button class="qr-btn" type="button" onclick="appendQuickReply('We are reviewing your concern and will respond shortly.')">Acknowledge</button>
      <button class="qr-btn" type="button" onclick="appendQuickReply('Please provide more details so we can assist you better.')">Ask for details</button>
      <button class="qr-btn" type="button" onclick="appendQuickReply('Thank you for your patience. We are looking into this now.')">Thank you</button>
    </div>

    <div class="input-bar admin-input-bar">
      <div class="input-wrap">
        <textarea id="admin-msg-input" rows="1" placeholder="Type your response…" aria-label="Chat message input"></textarea>
      </div>
      <button class="send-btn" id="admin-send-btn" type="button" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/chat_admin.js"></script>
</body>
</html>
